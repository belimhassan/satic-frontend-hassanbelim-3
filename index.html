<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Dashboard</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app-container">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">⚪</div>
  <ul>
    <li>Search</li>
    <li class="active">Dashboard</li>
    <li>Analytics</li>
    <li>Projects</li>
    <li>Settings</li>
  </ul>
</aside>

<!-- MAIN -->
<div class="main-area">

<header class="top-header">
  <th scope="col">ID</th>
   <button id="menu-toggle">☰</button>
  <input class="search" placeholder="Search">

  <div class="user">
    <img src="https://i.pravatar.cc/40" alt="User profile">
    <span>Hassan Belim</span>
  </div>
</header>

<main class="dashboard">

<h1>Analytics Overview</h1>

<!-- CONTROLS -->
<div class="controls">
 <label for="search-input" class="visually-hidden">Search users</label>
<input id="search-input" placeholder="Search users...">
 <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  <select id="status-filter">
    <option value="all">All</option>
    <option value="active">Active</option>
    <option value="pending">Pending</option>
    <option value="churned">Churned</option>
  </select>
</div>

<!-- TABLE -->
<div class="table-wrapper">
  <table class="data-table">
    <table class="data-table" role="table"></table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Revenue</th>
        <th>Status</th>
        <th>Last Login</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<!-- DASHBOARD -->
<h2>Dashboard Overview</h2>

<div class="cards">
  <div class="card"></div>
  <div class="card"></div>
  <div class="card"></div>
  <div class="card"></div>
</div>

<!-- GRAPHS -->
<div class="chart-container">
  <canvas id="barChart"></canvas>
</div>

<div class="chart-container">
  <canvas id="lineChart"></canvas>
</div>

</main>
</div>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
