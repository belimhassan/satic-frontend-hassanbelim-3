<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Dashboard</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app-container">

   
    <aside class="sidebar">

          <button id="close-menu">✖</button>
        <div class="logo">⚪</div>

        <nav>
            <ul>
                <li>Search</li>
                <li class="active">Dashboard</li>
                <li>Analytics</li>
                <li>Projects</li>
                <li>Settings</li>
            </ul>
        </nav>

    </aside>
    


   
    <div class="main-area">

       
        <header class="top-header">
             <button id="menu-toggle">☰</button>

            <input class="search" placeholder="Search" aria-label="Search users">

            <div class="user">
              <img src="https://i.pravatar.cc/40" 
     alt="User" 
     width="40" 
     height="40" 
     loading="lazy">
                <span>Hassan Belim </span>
            </div>
            

            

        </header>


       
        <main class="dashboard">
           <div class="table-section">
          <div class="table-header">
      <h1>Analytics Overview</h1>
      <input id="search-input" placeholder="Search users..." />
    </div>
    <button id="theme-toggle" aria-label="Toggle dark mode">
  🌙 <span style="display:none;">Toggle Theme</span>
</button>

<select id="status-filter">
  <option value="all">All</option>
  <option value="active">Active</option>
  <option value="pending">Pending</option>
  <option value="churned">Churned</option>
</select>
<div class="table-wrapper">
  <table class="data-table" aria-label="User analytics table">    
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Revenue</th>
        <th>Status</th>
        <th>Last Login</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>
    
    </div>

  <h2>Dashboard Overview</h2>

  <div class="cards">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </div>
   <!--chart-->
  <div class="chart-container">
    <canvas id="revenueChart"></canvas>
  </div>

  <!-- ✅ SINGLE TABLE SECTION -->
 


    
  </div>

</main>
  

<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
